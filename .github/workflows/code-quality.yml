name: Code Quality

on:
  push:
    paths:
      - "codemods/**/*.js"
      - "codemods/**/*.ts"
      - "codemods/**/*.tsx"
      - "codemods/**/*.jsx"
      - "codemods/**/codemod.yaml"
      - "codemods/**/workflow.yaml"
      - "codemods/**/package.json"
      - "codemods/**/package-lock.json"
      - "codemods/**/tests/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "biome.jsonc"
      - ".github/workflows/code-quality.yml"
  pull_request:
    paths:
      - "codemods/**/*.js"
      - "codemods/**/*.ts"
      - "codemods/**/*.tsx"
      - "codemods/**/*.jsx"
      - "codemods/**/codemod.yaml"
      - "codemods/**/workflow.yaml"
      - "codemods/**/package.json"
      - "codemods/**/package-lock.json"
      - "codemods/**/tests/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "biome.jsonc"
      - ".github/workflows/code-quality.yml"
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  lint-and-types:
    name: Lint & types
    runs-on: ubuntu-slim

    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: "npm"
          node-version: "lts/*"

      - run: npm ci
      - run: node --run check
      - run: node --run typecheck

  test:
    name: Before/After tests
    runs-on: ${{ matrix.os }}

    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: "npm"
          node-version: "lts/*"

      - run: npm ci

      - name: Run tests related to changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
            base_sha="$(git merge-base origin/${{ github.event.repository.default_branch }} HEAD)"
          else
            base_sha="${{ github.event.before }}"
          fi

          changed_paths="$(git diff --name-only "$base_sha" "${{ github.sha }}")"

          # Run everything when shared configuration or workflow behavior changes.
          if echo "$changed_paths" | grep -qE '^(package(-lock)?\.json|tsconfig\.json|biome\.jsonc|\.github/workflows/code-quality\.yml)$'; then
            npm run test --workspaces --if-present
            exit 0
          fi

          codemod_paths="$(echo "$changed_paths" | grep '^codemods/' || true)"
          workspaces="$(
            echo "$codemod_paths" \
              | cut -d/ -f1,2 \
              | sort -u \
              | sed 's/^/--workspace=/'
          )"

          if [[ -z "$workspaces" ]]; then
            echo "No codemod workspaces changed; skipping before/after tests."
            exit 0
          fi

          npm run test --if-present $workspaces
