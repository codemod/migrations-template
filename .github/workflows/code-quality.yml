name: Code Quality

on:
  push:
    paths:
      - 'codemods/**/*.js'
      - 'codemods/**/*.ts'
      - 'codemods/**/*.tsx'
      - 'codemods/**/*.jsx'
      - 'codemods/**/codemod.yaml'
      - 'codemods/**/workflow.yaml'
      - 'codemods/**/package.json'
      - 'codemods/**/tests/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.oxfmtrc.json'
      - '.oxlintrc.json'
      - '.github/workflows/code-quality.yml'
  pull_request:
    paths:
      - 'codemods/**/*.js'
      - 'codemods/**/*.ts'
      - 'codemods/**/*.tsx'
      - 'codemods/**/*.jsx'
      - 'codemods/**/codemod.yaml'
      - 'codemods/**/workflow.yaml'
      - 'codemods/**/package.json'
      - 'codemods/**/tests/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.oxfmtrc.json'
      - '.oxlintrc.json'
      - '.github/workflows/code-quality.yml'
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  lint-and-types:
    name: Lint & types
    runs-on: ubuntu-slim

    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          show-progress: false

      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 22

      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run check-types

  test:
    name: Before/After tests
    runs-on: ${{ matrix.os }}

    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - name: Run tests related to changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
            base_sha="$(git merge-base origin/${{ github.event.repository.default_branch }} HEAD)"
          else
            base_sha="${{ github.event.before }}"
          fi

          changed_paths="$(git diff --name-only "$base_sha" "${{ github.sha }}")"

          # Run everything when shared configuration or workflow behavior changes.
          if echo "$changed_paths" | grep -qE '^(package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|\.oxfmtrc\.json|\.oxlintrc\.json|\.github/workflows/code-quality\.yml)$'; then
            pnpm run test
            exit 0
          fi

          codemod_paths="$(echo "$changed_paths" | grep '^codemods/' || true)"
          filters="$(
            echo "$codemod_paths" \
              | cut -d/ -f1,2 \
              | sort -u \
              | sed 's|^|--filter ./|'
          )"

          if [[ -z "$filters" ]]; then
            echo "No codemod workspaces changed; skipping before/after tests."
            exit 0
          fi

          for filter in $filters; do
            pnpm "$filter" test
          done
