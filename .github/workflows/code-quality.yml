name: Code Quality

on:
  push:
    branches: ["*"]
    paths:
      - "codemods/**/*.js"
      - "codemods/**/*.ts"
      - "codemods/**/*.tsx"
      - "codemods/**/package.json"
      - "package.json"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["*"]
    paths:
      - "codemods/**/*.js"
      - "codemods/**/*.ts"
      - "codemods/**/*.tsx"
      - "codemods/**/package.json"
      - "package.json"
      - ".github/workflows/ci.yml"
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  lint-and-types:
    name: Lint & types
    runs-on: ubuntu-slim

    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - run: npm ci
      - run: node --run check
      - run: node --run typecheck

  test:
    name: Before/After tests
    runs-on: ${{ matrix.os }}

    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: "npm"
          check-latest: true
          node-version-file: ".nvmrc"

      - run: npm ci

      - name: Run tests related to changes
        shell: bash
        run: >
          changed_paths=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }})

          # run everything?
          if echo "$changed_paths" | grep -qE '^(package\.json|\.github/workflows/ci\.yml|utils/)$'; then
            npm run test --workspaces
            exit 0
          fi

          # run for specific workspace(s)
          npm run test $(
            echo "$changed_paths" \
            | grep '^codemods/'
            | cut -d/ -f1,2
            | sort -u
            | sed 's/^/--workspace=/'
          )
